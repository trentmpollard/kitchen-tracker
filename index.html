<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kitchen Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a7a52">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitchen">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.header{background:white;padding:16px 20px 12px;border-bottom:1px solid #e8e7e2;position:sticky;top:0;z-index:50;}
.header h1{font-size:21px;font-weight:700;letter-spacing:-0.3px;}
.header-sub{font-size:13px;color:#888;margin-top:2px;}
.header-stats{display:flex;gap:12px;margin-top:10px;}
.hstat{text-align:center;}
.hstat-num{font-size:18px;font-weight:700;}
.hstat-num.green{color:#2a7a52;}.hstat-num.red{color:#d44;}.hstat-num.blue{color:#2563eb;}
.hstat-label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.4px;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid #e8e7e2;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 10px;background:none;border:none;cursor:pointer;font-size:10px;color:#aaa;gap:4px;font-family:inherit;transition:color 0.15s;}
.nav-btn.active{color:#2a7a52;}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8;}
.nav-badge{position:absolute;top:6px;background:#e44;color:white;border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;}
.nav-icon-wrap{position:relative;}
.content{flex:1;padding:14px 14px 90px;}
.tab-view{display:none;}.tab-view.active{display:block;}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:#999;margin:16px 0 8px 2px;}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.item-card{background:white;border-radius:12px;padding:11px 12px 11px 10px;display:flex;align-items:center;gap:9px;border:1.5px solid #e8e7e2;cursor:pointer;position:relative;min-height:52px;}
.item-card.out{background:#fff8f8;border-color:#f5c0c0;}
.item-dot{width:18px;height:18px;border-radius:50%;border:2px solid #d0d0cc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.item-card.in .item-dot{background:#2a7a52;border-color:#2a7a52;}
.item-card.in .item-dot::after{content:'\2713';color:white;font-size:10px;font-weight:800;}
.item-name{font-size:13px;font-weight:500;flex:1;line-height:1.3;}
.item-card.out .item-name{color:#b33;}
.item-del{position:absolute;top:4px;right:4px;width:18px;height:18px;background:#f0eeea;border:none;border-radius:50%;cursor:pointer;font-size:11px;color:#aaa;display:none;align-items:center;justify-content:center;}
.item-card:hover .item-del{display:flex;}
.add-bar{display:flex;gap:8px;margin-bottom:4px;}
.add-bar input{flex:1;padding:11px 14px;border:1.5px solid #e0dfd9;border-radius:11px;font-size:15px;background:white;font-family:inherit;outline:none;}
.add-bar input:focus{border-color:#2a7a52;}
.add-bar select{padding:11px 10px;border:1.5px solid #e0dfd9;border-radius:11px;font-size:14px;background:white;font-family:inherit;outline:none;color:#444;}
.btn-green{padding:11px 16px;background:#2a7a52;color:white;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.shop-title{font-size:17px;font-weight:700;}
.btn-copy{padding:8px 14px;background:#2a7a52;color:white;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.shop-item{background:white;border-radius:11px;padding:13px 14px;margin-bottom:7px;display:flex;align-items:center;gap:11px;border:1px solid #e8e7e2;transition:opacity 0.15s;}
.shop-item.auto{border-left:3px solid #e44;}.shop-item.manual{border-left:3px solid #f0a030;}.shop-item.checked{opacity:0.45;}
.shop-item-info{flex:1;}
.shop-item-name{font-size:15px;font-weight:500;}
.shop-item.checked .shop-item-name{text-decoration:line-through;}
.shop-item-tag{font-size:11px;color:#999;margin-top:1px;}
.shop-check{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;cursor:pointer;flex-shrink:0;background:white;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.shop-item.checked .shop-check{background:#2a7a52;border-color:#2a7a52;}
.shop-item.checked .shop-check::after{content:'\2713';color:white;font-size:11px;font-weight:800;}
.shop-del{background:none;border:none;color:#ddd;cursor:pointer;padding:4px;font-size:17px;line-height:1;}
.add-shop-row{display:flex;gap:8px;margin-top:10px;}
.add-shop-row input{flex:1;padding:11px 14px;border:1.5px solid #e0dfd9;border-radius:11px;font-size:15px;background:white;font-family:inherit;outline:none;}
.empty-shop{text-align:center;padding:32px 20px;color:#999;font-size:15px;}
.empty-shop-icon{font-size:44px;margin-bottom:10px;}
.meal-card{background:white;border-radius:14px;padding:14px 15px;margin-bottom:10px;border:1px solid #e8e7e2;}
.meal-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.meal-name{font-size:16px;font-weight:600;flex:1;}
.meal-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-green{background:#e6f5ec;color:#2a7a52;}.badge-red{background:#fdf0f0;color:#c44;}.badge-gray{background:#f0f0ec;color:#888;}
.meal-ingredients{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.ing-pill{padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500;}
.ing-have{background:#e6f5ec;color:#2a7a52;}.ing-miss{background:#fdf0f0;color:#c44;}
.meal-actions{display:flex;gap:7px;margin-top:11px;}
.btn-add-shop{flex:1;padding:9px;border-radius:9px;border:1px solid #e0dfd9;background:white;font-size:13px;font-weight:500;cursor:pointer;color:#444;font-family:inherit;}
.btn-del-meal{width:34px;height:34px;background:none;border:1px solid #ede;border-radius:9px;cursor:pointer;color:#ccc;font-size:14px;display:flex;align-items:center;justify-content:center;}
.add-meal-form{background:white;border-radius:14px;padding:15px;margin-bottom:14px;border:1.5px solid #2a7a52;display:none;}
.add-meal-form.visible{display:block;}
.form-label{font-size:12px;font-weight:600;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid #e0dfd9;border-radius:11px;font-size:15px;margin-bottom:12px;font-family:inherit;outline:none;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.tag-pill{background:#e6f5ec;color:#2a7a52;padding:4px 9px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:4px;}
.tag-rm{background:none;border:none;color:#2a7a52;cursor:pointer;font-size:14px;padding:0;line-height:1;}
.tag-add-row{display:flex;gap:7px;margin-bottom:14px;}
.tag-add-row input{flex:1;padding:10px 13px;border:1.5px solid #e0dfd9;border-radius:11px;font-size:14px;font-family:inherit;outline:none;}
.tag-add-row button{padding:10px 13px;background:#f0f0ec;border:1px solid #e0dfd9;border-radius:11px;font-size:13px;cursor:pointer;color:#555;font-family:inherit;white-space:nowrap;}
.form-btns{display:flex;gap:8px;}
.btn-save{flex:1;padding:12px;background:#2a7a52;color:white;border:none;border-radius:11px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-cancel{padding:12px 16px;background:#f0f0ec;color:#666;border:none;border-radius:11px;font-size:15px;cursor:pointer;font-family:inherit;}
.tonight-hero{background:#2a7a52;border-radius:16px;padding:18px 20px;margin-bottom:14px;color:white;}
.tonight-hero h2{font-size:19px;font-weight:700;margin-bottom:3px;}
.tonight-hero p{font-size:13px;opacity:0.82;}
.suggest-card{background:white;border-radius:14px;padding:14px 15px;margin-bottom:9px;border:1px solid #e8e7e2;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.suggest-info{flex:1;}.suggest-name{font-size:16px;font-weight:600;}.suggest-sub{font-size:13px;color:#888;margin-top:3px;}
.btn-cook{padding:9px 15px;background:#2a7a52;color:white;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0;}
.almost-card{background:white;border-radius:14px;padding:14px 15px;margin-bottom:9px;border:1px solid #f5d9b0;}
.almost-top{display:flex;justify-content:space-between;align-items:center;}
.almost-name{font-size:15px;font-weight:600;color:#a06010;}.almost-missing{font-size:13px;color:#c44;margin-top:5px;}
.btn-add-missing{padding:7px 12px;background:#fff4e6;color:#a06010;border:1px solid #f5d9b0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.empty-tonight{text-align:center;padding:40px 20px;color:#999;}.empty-tonight-icon{font-size:52px;margin-bottom:12px;}
.cook-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:none;align-items:flex-end;justify-content:center;}
.cook-modal-overlay.open{display:flex;}
.cook-modal{background:white;border-radius:22px 22px 0 0;padding:20px 18px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.cook-modal-handle{width:40px;height:4px;background:#e0dfd9;border-radius:4px;margin:0 auto 18px;}
.cook-modal-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.cook-modal-sub{font-size:13px;color:#888;margin-bottom:18px;}
.cook-ing-list{list-style:none;margin-bottom:20px;}
.cook-ing-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0efeb;cursor:pointer;}
.cook-ing-item:last-child{border-bottom:none;}
.cook-ing-cb{width:22px;height:22px;border-radius:6px;border:2px solid #d0d0cc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.cook-ing-item.used .cook-ing-cb{background:#2a7a52;border-color:#2a7a52;}
.cook-ing-item.used .cook-ing-cb::after{content:'\2713';color:white;font-size:12px;font-weight:800;}
.cook-ing-item.used .cook-ing-name{text-decoration:line-through;color:#aaa;}
.cook-ing-name{font-size:16px;flex:1;}.cook-ing-status{font-size:12px;padding:3px 9px;border-radius:20px;}
.cook-btn-done{width:100%;padding:15px;background:#2a7a52;color:white;border:none;border-radius:13px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.cook-btn-close{width:100%;padding:13px;background:#f0f0ec;color:#666;border:none;border-radius:13px;font-size:15px;cursor:pointer;font-family:inherit;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.92);color:white;padding:10px 20px;border-radius:22px;font-size:14px;opacity:0;transition:opacity 0.2s;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.top-btn-row{display:flex;gap:8px;margin-bottom:14px;}
.btn-outline{flex:1;padding:10px;background:white;color:#2a7a52;border:1.5px solid #2a7a52;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{padding:6px 13px;border-radius:20px;border:1px solid #e0dfd9;background:white;font-size:13px;color:#666;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.12s;}
.filter-chip.active{background:#2a7a52;color:white;border-color:#2a7a52;}
</style>
</head>
<body>
<div class="header">
  <div><h1>&#127968; Kitchen Tracker</h1><div class="header-sub" id="header-sub">Loading...</div></div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-num green" id="stat-in">0</div><div class="hstat-label">In Stock</div></div>
    <div class="hstat"><div class="hstat-num red" id="stat-out">0</div><div class="hstat-label">Need</div></div>
    <div class="hstat"><div class="hstat-num blue" id="stat-cook">0</div><div class="hstat-label">Can Cook</div></div>
  </div>
</div>
<div class="content">
  <div class="tab-view active" id="tab-pantry">
    <div class="filter-row" id="cat-filters"></div>
    <div class="add-bar">
      <input type="text" id="new-item-name" placeholder="Add item..."/>
      <select id="new-item-cat">
        <option value="Produce">&#129382; Produce</option><option value="Dairy">&#129472; Dairy</option>
        <option value="Meat">&#129385; Meat</option><option value="Pantry" selected>&#129403; Pantry</option>
        <option value="Frozen">&#10052;&#65039; Frozen</option><option value="Beverages">&#129380; Drinks</option>
        <option value="Snacks">&#127850; Snacks</option><option value="Other">&#128230; Other</option>
      </select>
      <button class="btn-green" onclick="addPantryItem()">Add</button>
    </div>
    <div id="pantry-list"></div>
  </div>
  <div class="tab-view" id="tab-shop">
    <div class="shop-header"><div class="shop-title">Shopping List</div><button class="btn-copy" onclick="copyShopList()">&#128203; Copy List</button></div>
    <div id="shop-auto-section"></div><div id="shop-manual-section"></div>
    <div class="add-shop-row"><input type="text" id="new-shop-item" placeholder="Add item manually..."/><button class="btn-green" onclick="addShopItem()">Add</button></div>
  </div>
  <div class="tab-view" id="tab-meals">
    <div class="top-btn-row"><button class="btn-outline" onclick="toggleAddMealForm()">+ Add Meal</button></div>
    <div class="add-meal-form" id="add-meal-form">
      <div class="form-label">Meal Name</div>
      <input class="form-input" id="meal-name-input" type="text" placeholder="e.g. Chicken Tacos"/>
      <div class="form-label">Ingredients</div>
      <div class="tag-row" id="meal-tags"></div>
      <div class="tag-add-row">
        <input type="text" id="ing-input" placeholder="Add ingredient..." list="pantry-suggestions"/>
        <datalist id="pantry-suggestions"></datalist>
        <button onclick="addIngredientTag()">+ Add</button>
      </div>
      <div class="form-btns"><button class="btn-save" onclick="saveMeal()">Save Meal</button><button class="btn-cancel" onclick="toggleAddMealForm()">Cancel</button></div>
    </div>
    <div id="meals-list"></div>
  </div>
  <div class="tab-view" id="tab-tonight">
    <div class="tonight-hero"><h2>What's for dinner?</h2><p id="tonight-sub">Based on what you have right now</p></div>
    <div id="tonight-list"></div>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('pantry',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7h18M3 12h18M3 17h18"/></svg>Pantry
  </button>
  <button class="nav-btn" onclick="switchTab('shop',this)">
    <div class="nav-icon-wrap">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13l-1-5M10 21a1 1 0 100-2 1 1 0 000 2zm7 0a1 1 0 100-2 1 1 0 000 2z"/></svg>
      <span class="nav-badge" id="shop-badge" style="display:none">0</span>
    </div>Shop
  </button>
  <button class="nav-btn" onclick="switchTab('meals',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Meals
  </button>
  <button class="nav-btn" onclick="switchTab('tonight',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Tonight
  </button>
</nav>
<div class="toast" id="toast"></div>
<div class="cook-modal-overlay" id="cook-modal-overlay" onclick="closeCookModal(event)">
  <div class="cook-modal">
    <div class="cook-modal-handle"></div>
    <div class="cook-modal-title" id="cook-modal-title"></div>
    <div class="cook-modal-sub" id="cook-modal-sub"></div>
    <ul class="cook-ing-list" id="cook-ing-list"></ul>
    <button class="cook-btn-done" id="cook-btn-done"></button>
    <button class="cook-btn-close" onclick="document.getElementById('cook-modal-overlay').classList.remove('open')">Close</button>
  </div>
</div>
<script>
const CATS=['Produce','Dairy','Meat','Pantry','Frozen','Beverages','Snacks','Other'];
const CE={Produce:'&#129382;',Dairy:'&#129472;',Meat:'&#129385;',Pantry:'&#129403;',Frozen:'&#10052;&#65039;',Beverages:'&#129380;',Snacks:'&#127850;',Other:'&#128230;'};
const DP=[
  {id:'p1',name:'Onions',category:'Produce',inStock:true},{id:'p2',name:'Garlic',category:'Produce',inStock:true},
  {id:'p3',name:'Tomatoes',category:'Produce',inStock:false},{id:'p4',name:'Lettuce',category:'Produce',inStock:false},
  {id:'p5',name:'Bananas',category:'Produce',inStock:true},{id:'p6',name:'Apples',category:'Produce',inStock:true},
  {id:'p7',name:'Potatoes',category:'Produce',inStock:false},{id:'p8',name:'Carrots',category:'Produce',inStock:true},

  {id:'p11',name:'Butter',category:'Dairy',inStock:true},{id:'p12',name:'Shredded Cheese',category:'Dairy',inStock:false},
  {id:'p13',name:'Yogurt',category:'Dairy',inStock:false},{id:'p14',name:'Sour Cream',category:'Dairy',inStock:true},
  {id:'p15',name:'Chicken Breasts',category:'Meat',inStock:true},{id:'p16',name:'Ground Beef',category:'Meat',inStock:false},
  {id:'p17',name:'Bacon',category:'Meat',inStock:true},{id:'p18',name:'Sausage',category:'Meat',inStock:false},
  {id:'p19',name:'Rice',category:'Pantry',inStock:true},{id:'p20',name:'Pasta',category:'Pantry',inStock:true},

  {id:'p29',name:'Frozen Vegetables',category:'Frozen',inStock:true},{id:'p30',name:'Frozen Pizza',category:'Frozen',inStock:true},

  {id:'p33',name:'Orange Juice',category:'Beverages',inStock:false},{id:'p34',name:'Tortilla Chips',category:'Snacks',inStock:true},
  {id:'p35',name:'Crackers',category:'Snacks',inStock:false}
];
const DM=[
  {id:'m1',name:'Spaghetti Bolognese',ingredients:['Ground Beef','Pasta','Canned Tomatoes','Onions','Garlic']},
  {id:'m2',name:'Chicken Stir Fry',ingredients:['Chicken Breasts','Rice','Frozen Vegetables','Garlic']},
  {id:'m3',name:'Scrambled Eggs & Toast',ingredients:['Eggs','Butter','Bread']},
  {id:'m4',name:'Beef Tacos',ingredients:['Ground Beef','Shredded Cheese','Tomatoes','Lettuce','Sour Cream','Tortilla Chips']},
  {id:'m5',name:'Chicken Soup',ingredients:['Chicken Breasts','Chicken Broth','Carrots','Onions','Garlic']},
  {id:'m6',name:'Pasta with Butter & Cheese',ingredients:['Pasta','Butter','Shredded Cheese']},
  {id:'m7',name:'Bacon & Eggs',ingredients:['Bacon','Eggs','Bread']},
  {id:'m8',name:'Oatmeal',ingredients:['Oats','Milk','Bananas']},
  {id:'m9',name:'Grilled Chicken & Rice',ingredients:['Chicken Breasts','Rice','Frozen Vegetables']},
  {id:'m10',name:'BLT Sandwich',ingredients:['Bacon','Lettuce','Tomatoes','Bread','Sour Cream']}
];
let S={pantry:[],meals:[],shopExtra:[],shopChecked:[],catFilter:'All',newIngredients:[]};
function load(){try{const s=JSON.parse(localStorage.getItem('kt_v2')||'null');if(s){S.pantry=s.pantry||DP;S.meals=s.meals||DM;S.shopExtra=s.shopExtra||[];S.shopChecked=s.shopChecked||[];}else{S.pantry=DP;S.meals=DM;}}catch(e){S.pantry=DP;S.meals=DM;}}
function save(){localStorage.setItem('kt_v2',JSON.stringify({pantry:S.pantry,meals:S.meals,shopExtra:S.shopExtra,shopChecked:S.shopChecked}));}
function uid(){return 'i'+Math.random().toString(36).slice(2,8);}
function inStock(){return S.pantry.filter(i=>i.inStock).map(i=>i.name.toLowerCase());}
function outItems(){return S.pantry.filter(i=>!i.inStock);}
function canCook(m){const s=inStock();return m.ingredients.every(i=>s.includes(i.toLowerCase()));}
function missing(m){const s=inStock();return m.ingredients.filter(i=>!s.includes(i.toLowerCase()));}
function stats(){
  const ic=S.pantry.filter(i=>i.inStock).length,oc=S.pantry.filter(i=>!i.inStock).length,cc=S.meals.filter(canCook).length;
  document.getElementById('stat-in').textContent=ic;document.getElementById('stat-out').textContent=oc;document.getElementById('stat-cook').textContent=cc;
  document.getElementById('header-sub').textContent=cc>0?cc+' meal'+(cc===1?'':'s')+' ready to cook tonight':oc>0?oc+' item'+(oc===1?'':'s')+' need restocking':'All stocked up!';
  const sc=outItems().length+S.shopExtra.filter(e=>!e.checked).length,b=document.getElementById('shop-badge');
  b.textContent=sc;b.style.display=sc>0?'':'none';
}
function catFilters(){
  const cats=[...new Set(S.pantry.map(i=>i.category))].sort(),row=document.getElementById('cat-filters');row.innerHTML='';
  ['All',...cats].forEach(c=>{const b=document.createElement('button');b.className='filter-chip'+(S.catFilter===c?' active':'');b.textContent=c==='All'?'All':(CE[c]||'')+' '+c;b.onclick=()=>{S.catFilter=c;renderPantry();};row.appendChild(b);});
}
function renderPantry(){
  catFilters();const list=document.getElementById('pantry-list');list.innerHTML='';
  const fil=S.catFilter==='All'?S.pantry:S.pantry.filter(i=>i.category===S.catFilter);
  const grp={};CATS.forEach(c=>grp[c]=[]);fil.forEach(item=>{(grp[item.category]=grp[item.category]||[]).push(item);});
  Object.entries(grp).forEach(([cat,items])=>{
    if(!items.length)return;
    const lbl=document.createElement('div');lbl.className='section-label';lbl.innerHTML=(CE[cat]||'')+' '+cat;list.appendChild(lbl);
    const grid=document.createElement('div');grid.className='items-grid';
    items.forEach(item=>{const card=document.createElement('div');card.className='item-card '+(item.inStock?'in':'out');card.innerHTML='<div class="item-dot"></div><span class="item-name">'+item.name+'</span><button class="item-del" onclick="event.stopPropagation();delItem(\''+item.id+'\')">&#10005;</button>';card.onclick=()=>toggleItem(item.id);grid.appendChild(card);});
    list.appendChild(grid);
  });stats();
}
function toggleItem(id){const item=S.pantry.find(i=>i.id===id);if(!item)return;item.inStock=!item.inStock;save();renderPantry();renderShop();renderTonight();if(!item.inStock)toast('Added "'+item.name+'" to shopping list');}
function addPantryItem(){const n=document.getElementById('new-item-name'),c=document.getElementById('new-item-cat'),name=n.value.trim();if(!name)return;if(S.pantry.find(i=>i.name.toLowerCase()===name.toLowerCase())){toast('Already in pantry!');return;}S.pantry.push({id:uid(),name,category:c.value,inStock:true});n.value='';save();renderPantry();datalist();toast('"'+name+'" added');}
function delItem(id){const item=S.pantry.find(i=>i.id===id);S.pantry=S.pantry.filter(i=>i.id!==id);save();renderPantry();renderShop();renderTonight();if(item)toast('"'+item.name+'" removed');}
function renderShop(){
  const out=outItems(),as=document.getElementById('shop-auto-section'),ms=document.getElementById('shop-manual-section');as.innerHTML='';ms.innerHTML='';
  if(!out.length&&!S.shopExtra.length){as.innerHTML='<div class="empty-shop"><div class="empty-shop-icon">&#9989;</div><p>Nothing needed — all stocked up!</p></div>';return;}
  if(out.length){const l=document.createElement('div');l.className='section-label';l.textContent='&#128;&#155; Out of stock';as.appendChild(l);out.forEach(item=>{const chk=S.shopChecked.includes(item.id),d=document.createElement('div');d.className='shop-item auto'+(chk?' checked':'');d.innerHTML='<div class="shop-check" onclick="chkShop(\''+item.id+'\',\'auto\')"></div><div class="shop-item-info"><div class="shop-item-name">'+item.name+'</div><div class="shop-item-tag">'+(CE[item.category]||'')+' '+item.category+'</div></div><button class="shop-del" onclick="markBack(\''+item.id+'\')">&#10003; Got it</button>';as.appendChild(d);});}
  if(S.shopExtra.length){const l=document.createElement('div');l.className='section-label';l.textContent='&#128; Added manually';ms.appendChild(l);S.shopExtra.forEach(item=>{const d=document.createElement('div');d.className='shop-item manual'+(item.checked?' checked':'');d.innerHTML='<div class="shop-check" onclick="chkShop(\''+item.id+'\',\'manual\')"></div><div class="shop-item-info"><div class="shop-item-name">'+item.name+'</div></div><button class="shop-del" onclick="delShop(\''+item.id+'\')">&#10005;</button>';ms.appendChild(d);});}
  stats();
}
function chkShop(id,type){if(type==='auto'){const i=S.shopChecked.indexOf(id);if(i>=0)S.shopChecked.splice(i,1);else S.shopChecked.push(id);}else{const item=S.shopExtra.find(i=>i.id===id);if(item)item.checked=!item.checked;}save();renderShop();}
function markBack(id){const item=S.pantry.find(i=>i.id===id);if(item){item.inStock=true;S.shopChecked=S.shopChecked.filter(c=>c!==id);}save();renderPantry();renderShop();renderTonight();if(item)toast('"'+item.name+'" back in stock');}
function addShopItem(){const input=document.getElementById('new-shop-item'),name=input.value.trim();if(!name)return;S.shopExtra.push({id:uid(),name,checked:false});input.value='';save();renderShop();stats();}
function delShop(id){S.shopExtra=S.shopExtra.filter(i=>i.id!==id);save();renderShop();stats();}
function copyShopList(){const lines=[];outItems().filter(i=>!S.shopChecked.includes(i.id)).forEach(i=>lines.push('- '+i.name));S.shopExtra.filter(i=>!i.checked).forEach(i=>lines.push('- '+i.name));if(!lines.length){toast('Nothing to copy!');return;}navigator.clipboard.writeText('Walmart Order - '+new Date().toLocaleDateString()+'\n\n'+lines.join('\n')).then(()=>toast('Copied! Paste into Walmart app')).catch(()=>toast('Copy failed - try again'));}
function renderMeals(){
  datalist();const list=document.getElementById('meals-list');list.innerHTML='';
  if(!S.meals.length){list.innerHTML='<div style="text-align:center;padding:40px 20px;color:#999">No meals yet!</div>';return;}
  const sorted=[...S.meals].sort((a,b)=>canCook(b)?1:canCook(a)?-1:0);const is=inStock();
  sorted.forEach(m=>{const miss=missing(m),can=miss.length===0,card=document.createElement('div');card.className='meal-card';const pills=m.ingredients.map(ing=>'<span class="ing-pill '+(is.includes(ing.toLowerCase())?'ing-have':'ing-miss')+'">'+ing+'</span>').join('');card.innerHTML='<div class="meal-row"><div class="meal-name">'+m.name+'</div><span class="meal-badge '+(can?'badge-green':miss.length<=2?'badge-red':'badge-gray')+'">'+(can?'&#10003; Ready':miss.length+' missing')+'</span></div><div class="meal-ingredients">'+pills+'</div><div class="meal-actions">'+(can?'':'<button class="btn-add-shop" onclick="addMissing(\''+m.id+'\')">+ Add missing to list</button>')+'<button class="btn-del-meal" onclick="delMeal(\''+m.id+'\')">&#10005;</button></div>';list.appendChild(card);});
}
function addMissing(mealId){const m=S.meals.find(x=>x.id===mealId);if(!m)return;const miss=missing(m);miss.forEach(ing=>{const p=S.pantry.find(i=>i.name.toLowerCase()===ing.toLowerCase());if(p)p.inStock=false;else if(!S.shopExtra.find(i=>i.name.toLowerCase()===ing.toLowerCase()))S.shopExtra.push({id:uid(),name:ing,checked:false});});save();renderPantry();renderShop();renderTonight();renderMeals();toast(miss.length+' item'+(miss.length===1?'':'s')+' added to shopping list');}
function delMeal(id){const m=S.meals.find(x=>x.id===id);S.meals=S.meals.filter(x=>x.id!==id);save();renderMeals();renderTonight();stats();if(m)toast('"'+m.name+'" removed');}
function toggleAddMealForm(){const f=document.getElementById('add-meal-form');f.classList.toggle('visible');if(f.classList.contains('visible')){S.newIngredients=[];document.getElementById('meal-name-input').value='';document.getElementById('ing-input').value='';renderTags();document.getElementById('meal-name-input').focus();}}
function renderTags(){document.getElementById('meal-tags').innerHTML=S.newIngredients.map((ing,i)=>'<span class="tag-pill">'+ing+'<button class="tag-rm" onclick="rmTag('+i+')">&#10005;</button></span>').join('');}
function rmTag(i){S.newIngredients.splice(i,1);renderTags();}
function addIngredientTag(){const input=document.getElementById('ing-input'),val=input.value.trim();if(!val)return;if(!S.newIngredients.includes(val))S.newIngredients.push(val);input.value='';renderTags();input.focus();}
function saveMeal(){const name=document.getElementById('meal-name-input').value.trim();if(!name){toast('Enter a meal name');return;}if(!S.newIngredients.length){toast('Add at least one ingredient');return;}S.meals.push({id:uid(),name,ingredients:[...S.newIngredients]});save();toggleAddMealForm();renderMeals();renderTonight();stats();toast('"'+name+'" added!');}
function datalist(){document.getElementById('pantry-suggestions').innerHTML=S.pantry.map(i=>'<option value="'+i.name+'">').join('');}
function renderTonight(){
  const list=document.getElementById('tonight-list');list.innerHTML='';
  const cookable=S.meals.filter(canCook),almost=S.meals.filter(m=>!canCook(m)&&missing(m).length<=2);
  document.getElementById('tonight-sub').textContent=cookable.length>0?cookable.length+' meal'+(cookable.length===1?'':'s')+' you can make right now':'Stock up a few items and you\'ll be set!';
  if(!cookable.length&&!almost.length){list.innerHTML='<div class="empty-tonight"><div class="empty-tonight-icon">&#127829;</div><p style="font-size:16px;font-weight:600;margin-bottom:8px;color:#444">Looks like frozen pizza night</p><p style="font-size:14px">Mark items as in-stock or add meals to see what you can cook.</p></div>';return;}
  if(cookable.length){const l=document.createElement('div');l.className='section-label';l.textContent='Ready to cook';list.appendChild(l);cookable.forEach(m=>{const card=document.createElement('div');card.className='suggest-card';card.innerHTML='<div class="suggest-info"><div class="suggest-name">'+m.name+'</div><div class="suggest-sub">'+m.ingredients.length+' ingredients - all in stock</div></div><button class="btn-cook" onclick="cookMeal(\''+m.id+'\')">Cook it!</button>';list.appendChild(card);});}
  if(almost.length){const l=document.createElement('div');l.className='section-label';l.textContent='Almost there (1-2 missing)';list.appendChild(l);almost.forEach(m=>{const miss=missing(m),card=document.createElement('div');card.className='almost-card';card.innerHTML='<div class="almost-top"><div class="almost-name">'+m.name+'</div><button class="btn-add-missing" onclick="addMissing(\''+m.id+'\')">+ Add to list</button></div><div class="almost-missing">Missing: '+miss.join(', ')+'</div>';list.appendChild(card);});}
}
function switchTab(name,btn){document.querySelectorAll('.tab-view').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');btn.classList.add('active');if(name==='shop')renderShop();if(name==='meals')renderMeals();if(name==='tonight')renderTonight();}
let activeMeal=null,usedSet=new Set();
function cookMeal(mealId){const m=S.meals.find(x=>x.id===mealId);if(!m)return;activeMeal=m;usedSet=new Set(m.ingredients.map(i=>i.toLowerCase()));document.getElementById('cook-modal-title').textContent=m.name;document.getElementById('cook-modal-sub').textContent='Tap to uncheck anything you did not use up.';const list=document.getElementById('cook-ing-list');list.innerHTML='';m.ingredients.forEach(ing=>{const p=S.pantry.find(x=>x.name.toLowerCase()===ing.toLowerCase()),li=document.createElement('li');li.className='cook-ing-item used';li.innerHTML='<div class="cook-ing-cb"></div><span class="cook-ing-name">'+ing+'</span>'+(p?'<span class="cook-ing-status" style="background:#e6f5ec;color:#2a7a52">In stock</span>':'<span class="cook-ing-status" style="background:#fdf0f0;color:#c44">Already out</span>');li.onclick=()=>{const k=ing.toLowerCase();if(usedSet.has(k)){usedSet.delete(k);li.classList.remove('used');}else{usedSet.add(k);li.classList.add('used');}updateDoneBtn();};list.appendChild(li);});updateDoneBtn();document.getElementById('cook-modal-overlay').classList.add('open');}
function updateDoneBtn(){const btn=document.getElementById('cook-btn-done'),n=usedSet.size;btn.textContent=n>0?'Mark '+n+' ingredient'+(n===1?'':'s')+' as out of stock':'Nothing to mark - close when done';btn.onclick=finishCooking;}
function finishCooking(){if(!activeMeal)return;let marked=0;usedSet.forEach(k=>{const item=S.pantry.find(p=>p.name.toLowerCase()===k&&p.inStock);if(item){item.inStock=false;marked++;}});save();document.getElementById('cook-modal-overlay').classList.remove('open');renderPantry();renderShop();renderTonight();stats();toast(marked>0?marked+' item'+(marked===1?'':'s')+' added to your shopping list':'Enjoy your '+activeMeal.name+'!');activeMeal=null;}
function closeCookModal(e){if(e.target===document.getElementById('cook-modal-overlay'))document.getElementById('cook-modal-overlay').classList.remove('open');}
let tt;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600);}
document.getElementById('ing-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addIngredientTag();}});
document.getElementById('new-item-name').addEventListener('keydown',e=>{if(e.key==='Enter')addPantryItem();});
document.getElementById('new-shop-item').addEventListener('keydown',e=>{if(e.key==='Enter')addShopItem();});
load();renderPantry();stats();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{});}
</script>
</body>
</html>
